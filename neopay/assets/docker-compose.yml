# =============================================================================
# Full Stack Local Development Environment
# PostgreSQL, Redis, Kafka, RabbitMQ (optional), Prometheus, Grafana, Jaeger
# =============================================================================

version: "3.9"

networks:
  neopay-net:
    driver: bridge
    name: neopay-dev

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  oracle_data:
  grafana_data:
  prometheus_data:
  jaeger_data:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL - Ledger and Transaction Store
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15.4-alpine
    container_name: neopay-postgres
    environment:
      POSTGRES_DB: neopay_ledger
      POSTGRES_USER: neopay_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neopay_secure_pass_2024}
      POSTGRES_INITDB_ARGS: "-E UTF8 --lc-collate=C --lc-ctype=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=4
      -c max_wal_size=2GB
      -c min_wal_size=80MB
      -c log_destination=csvlog
      -c logging_collector=on
      -c log_connections=on
      -c log_disconnections=on
      -c log_duration=off
      -c log_line_prefix=%t:%r:%c:%u@%d
      -c log_lock_waits=on
      -c log_statement=ddl
      -c log_min_duration_statement=1000
      -c archive_mode=on
      -c wal_level=hot_standby
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neopay_app -d neopay_ledger"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis - Cache and Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: neopay-redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --slowlog-log-slower-than 10000
      --slowlog-max-len 128
      --latency-monitor-threshold 100
      --rename-command FLUSHDB ""
      --rename-command FLUSHALL ""
      --rename-command DEBUG ""
      --requirepass ${REDIS_PASSWORD:-redis_secure_2024}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Apache Kafka - Message Broker
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.2
    container_name: neopay-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_AUTOPURGE_PURGEINTERVAL: 1
      ZOOKEEPER_AUTOPURGE_SNAPRETENTIONCOUNT: 3
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.2
    container_name: neopay-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      KAFKA_MAX_IN_FLIGHT_REQUESTS_PER_CONNECTION: 5
      KAFKA_PRODUCER_ACKS: 1
      KAFKA_PRODUCER_RETRIES: 3
      KAFKA_CONSUMER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS: 10000
      KAFKA_METRICS_JMX_OPTS: "-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.port=9999"
      JMX_PORT: 9999
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9999:9999"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Kafka Topic Provisioner (runs once at startup)
  # ---------------------------------------------------------------------------
  kafka-topics:
    image: confluentinc/cp-kafka:7.5.2
    container_name: neopay-kafka-topics
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 6 --topic iso8583-ingress
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 6 --topic iso8583-egress
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic settlements
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic alerts
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic authorization-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic reversal-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic reconciliation-events
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3 --topic chargeback-events
      echo 'Topics created successfully'
      "
    networks:
      - neopay-net

  # ---------------------------------------------------------------------------
  # RabbitMQ (Optional alternative message broker)
  # Uncomment to use RabbitMQ instead of Kafka
  # ---------------------------------------------------------------------------
  # rabbitmq:
  #   image: rabbitmq:3.12-management-alpine
  #   container_name: neopay-rabbitmq
  #   environment:
  #     RABBITMQ_DEFAULT_USER: neopay
  #     RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_secure_2024}
  #     RABBITMQ_DEFAULT_VHOST: /neopay
  #     RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "+S 2:2"
  #     RABBITMQ_MNESIA_DIR: /var/lib/rabbitmq/mnesia
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   volumes:
  #     - rabbitmq_data:/var/lib/rabbitmq
  #   networks:
  #     - neopay-net
  #   healthcheck:
  #     test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G

  # ---------------------------------------------------------------------------
  # Oracle XE 21c (Optional - requires ~6GB RAM)
  # ---------------------------------------------------------------------------
  oracle-xe:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: neopay-oracle
    environment:
      ORACLE_PWD: ${ORACLE_PASSWORD:-OracleSecure2024}
      ORACLE_CHARACTERSET: AL32UTF8
      ORACLE_PDB: NEOPAYPDB
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -L system/$$ORACLE_PWD@//localhost:1521/XEPDB1 @/opt/oracle/oradata/check.sql || true"]
      interval: 60s
      timeout: 30s
      retries: 12
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics Collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: neopay-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--query.max-concurrency=20'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana - Metrics Visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.2
    container_name: neopay-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secure_2024}
      GF_SECURITY_ADMIN_EMAIL: admin@neopay.io
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
      GF_PANELS_DISABLE_SANITIZE_INPUT_HTML: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - neopay-net
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Jaeger - Distributed Tracing
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: neopay-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_PRIMARY: /var/lib/jaeger/data
      BADGER_DIRECTORY_TEMP: /tmp/jaeger
      QUERY_BASE_PATH: /jaeger
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: http://prometheus:9090
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
    volumes:
      - jaeger_data:/var/lib/jaeger/data
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Loki - Log Aggregation (optional)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.3
    container_name: neopay-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus Alertmanager (optional)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: neopay-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=:9093'
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - neopay-net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Keycloak - Identity Provider (OAuth2/OIDC)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: neopay-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_PASSWORD:-keycloak_admin_2024}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/neopay_ledger
      KC_DB_USERNAME: neopay_app
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-neopay_secure_pass_2024}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      - neopay-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SMTP Server (for email notifications/webhooks)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: neopay-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - neopay-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  neopay-converter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neopay-converter
    environment:
      SPRING_PROFILES_ACTIVE: local,kafka
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neopay_ledger
      SPRING_DATASOURCE_USERNAME: neopay_app
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-neopay_secure_pass_2024}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_SHOW_SQL: "false"
      SPRING_JPA_OPEN_IN_VIEW: "false"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_2024}
      SPRING_REDIS_TIMEOUT: 2000ms
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_GROUP_ID: neopay-converter
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      SPRING_KAFKA_CONSUMER_ENABLE_AUTO_COMMIT: "false"
      SPRING_KAFKA_PRODUCER_ACKS: 1
      KAFKA_TOPICS_ISO8583_INGRESS: iso8583-ingress
      KAFKA_TOPICS_ISO8583_EGRESS: iso8583-egress
      KAFKA_TOPICS_SETTLEMENTS: settlements
      KAFKA_TOPICS_ALERTS: alerts
      JAVA_OPTS: "-Xms256m -Xmx1024m -XX:+UseG1GC -Djava.security.egd=file:/dev/./urandom"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_NEOPAY: DEBUG
      LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    ports:
      - "8080:8080"
      - "7001:7001"
    volumes:
      - ./config:/opt/neopay/config:ro
      - ./schemas:/opt/neopay/schemas:ro
    networks:
      - neopay-net
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  neopay-switch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neopay-switch
    environment:
      SPRING_PROFILES_ACTIVE: local,kafka,switch
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/neopay_ledger
      SPRING_DATASOURCE_USERNAME: neopay_app
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-neopay_secure_pass_2024}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_2024}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPICS_ISO8583_INGRESS: iso8583-ingress
      KAFKA_TOPICS_ISO8583_EGRESS: iso8583-egress
      JAVA_OPTS: "-Xms512m -Xmx1536m -XX:+UseG1GC"
    ports:
      - "8081:8080"
    networks:
      - neopay-net
    depends_on:
      neopay-converter:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  neopay-auth-host:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neopay-auth-host
    environment:
      SPRING_PROFILES_ACTIVE: local,kafka,auth
      JAVA_OPTS: "-Xms256m -Xmx768m -XX:+UseG1GC"
    ports:
      - "8082:8080"
    networks:
      - neopay-net
    depends_on:
      neopay-switch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  neopay-simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neopay-simulator
    environment:
      SPRING_PROFILES_ACTIVE: local,simulator
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8080"
    networks:
      - neopay-net
    depends_on:
      neopay-converter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
