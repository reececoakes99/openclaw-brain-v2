---
# =============================================================================
# Neopay Simulator Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neopay-simulator
  namespace: neopay
  labels:
    app: neopay-simulator
    tier: simulator
    language: java
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: neopay-simulator
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: neopay-simulator
        tier: simulator
        version: "1.0.0"
    spec:
      serviceAccountName: neopay-sa
      containers:
        - name: neopay-simulator
          image: neopay/simulator:1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - "java"
            - "-server"
            - "-Xms128m"
            - "-Xmx256m"
            - "-jar"
            - "/opt/neopay/app.jar"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: neopay-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
