---
# =============================================================================
# Neopay Protocol Converter Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neopay-converter
  namespace: neopay
  labels:
    app: neopay-converter
    tier: application
    language: java
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: neopay-converter
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: neopay-converter
        tier: application
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
        config.kubernetes.io/hash: "v1-$(date +%s)"
    spec:
      serviceAccountName: neopay-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        supplementalGroups: [10000]
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [neopay-converter]
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values: [application]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: neopay-converter
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: neopay-converter
      containers:
        - name: neopay-converter
          image: neopay/converter:1.0.0
          imagePullPolicy: Always
          args:
            - "java"
            - "-server"
            - "-Xms512m"
            - "-Xmx2048m"
            - "-XX:+UseG1GC"
            - "-XX:MaxGCPauseMillis=200"
            - "-XX:+UseNUMA"
            - "-XX:+AlwaysPreTouch"
            - "-XX:+HeapDumpOnOutOfMemoryError"
            - "-XX:HeapDumpPath=/opt/neopay/logs/heapdump.hprof"
            - "-Djava.security.egd=file:/dev/./urandom"
            - "-jar"
            - "/opt/neopay/app.jar"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: jmx
              containerPort: 7001
              protocol: TCP
            - name: prometheus
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: neopay-config
            - secretRef:
                name: neopay-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SPRING_PROFILES_ACTIVE
              value: "production,kafka"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /opt/neopay/config
              readOnly: true
            - name: logs
              mountPath: /opt/neopay/logs
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 30"]
      volumes:
        - name: config
          emptyDir: {}
        - name: logs
          emptyDir:
            sizeLimit: 2Gi
---
