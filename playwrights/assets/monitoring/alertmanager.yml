global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@playwrights.example.com'
  smtp_auth_username: 'alerts@playwrights.example.com'

templates:
  - '/etc/alertmanager/template/*.tmpl'

route:
  group_by: ['service', 'alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true
    - match:
        severity: warning
      receiver: email-warning

receivers:
  - name: default
    email_configs:
      - to: 'team@playwrights.example.com'
        send_resolved: true

  - name: pagerduty-critical
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        severity: critical
        event_action: 'trigger'
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        details:
          severity: critical
          service: playwrights

  - name: email-warning
    email_configs:
      - to: 'team@playwrights.example.com'
        send_resolved: true
        headers:
          subject: '[WARNING] {{ .GroupLabels.alertname }}'
        html: '<h2>Playwrights Alert</h2><p>{{ .CommonAnnotations.summary }}</p><p>{{ .CommonAnnotations.description }}</p>'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']