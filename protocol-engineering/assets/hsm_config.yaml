# HSM Configuration for Thales PayShield 10K/HSM
# Reference configuration for key management operations

version: "1.0"
hsm_model: "Thales PayShield 10K"

# Key Scheme
key_scheme: "double_length"  # 256-bit (double-length) or 128-bit (single-length)
lmk_identifier: "LMK-DL-01"

# Key Hierarchy
key_hierarchy:
  LMK: "Local Master Key - stored in HSM, never exported"
  ZMK: "Zone Master Key - exchanged between HSMs via secure transport"
  TMK: "Terminal Master Key - sent to POS terminals via key exchange"
  TAK: "Terminal Authentication Key - derived from TMK"
  TPK: "Terminal PIN Key - derived from TMK, encrypted under ZMK"
  PEK: "PIN Encryption Key - for PAN encryption"
  MFK: "Master File Key - parent of all working keys"
  KEK: "Key Encryption Key - used to wrap DEKs"
  DEK: "Data Encryption Key - used for field-level encryption"

# PIN Block Formats (ISO 9564-1)
pin_block_formats:
  format_0:
    name: "ISO 9564-1 Format 0"
    description: "ANSI X9.8 / VISA format"
    structure: "01 + PIN + Filler + PAN"
    example: "012345678901234567890ABCDEF"
    usage: "Most common format for POS terminals"
  format_1:
    name: "ISO 9564-1 Format 1"
    description: "Interchange encoded"
    structure: "02 + PIN + PAN"
    usage: "Interbank transfers"
  format_2:
    name: "ISO 9564-1 Format 2"
    description: "PIN from offline auth"
    structure: "03 + PIN + Card Seq"
    usage: "Offline authentication"
  format_3:
    name: "ISO 9564-1 Format 3"
    description: "Residual hash"
    structure: "04 + PIN + Hash"
    usage: "PIN translation scenarios"

# MAC Algorithms
mac_algorithms:
  iso9797_1:
    name: "ISO 9797-1 MAC"
    description: "CBC mode with zero IV"
    block_cipher: "DES/3DES"
    padding: "ISO 9797-1 padding method 3"
    usage: "Standard card transaction MAC"
  emv_cvc3:
    name: "EMV CVC3"
    description: "Cryptogram for offline auth"
    algorithm: "ARQC calculation"
    usage: "EMV chip card transactions"
  x9_19:
    name: "ANSI X9.19"
    description: "Retail MAC"
    padding: "ISO 9797-1 method 3"
    algorithm: "DES-3DES"
    usage: "ISO 8583 financial messages"

# Key Check Value Format
kcv:
  algorithm: "CBC-zeropad"
  cipher: "DES"
  output_length: 3  # bytes
  hex_length: 6     # ASCII hex
  example: "A1B2C3"

# Working Keys (in production, these are generated by HSM)
working_keys:
  MFK:
    name: "Master File Key"
    type: "KEK"
    length: 32  # double-length DES
    generation: "HSM Generate (KMT/KMH commands)"
  PEK:
    name: "PIN Encryption Key"
    type: "Data encryption"
    parent: "MFK"
    generation: "HSM Generate"
  TAK:
    name: "Terminal Authentication Key"
    type: "MAC generation"
    parent: "TMK"
    generation: "Derived from TMK"
  TPK:
    name: "Terminal PIN Key"
    type: "PIN block encryption"
    parent: "TMK"
    generation: "Derived from TMK"

# ARQC / ARPC Parameters
emv_crypto:
  ARQC:
    algorithm: "AES-128 or 3DES"
    keys:
      MK_AC: "Application Cryptogram Key (per card)"
      MK_SMI: "Issuer Master Key"
      MK_ARPC: "ARPC Master Key"
  ARPC:
    response_codes:
      0x00: "Approved"
      0x01: "Decline - No reason specified"
      0x02: "Decline - Card reported lost"
      0x03: "Decline - Stolen card"
      0x04: "Decline - Insufficient funds"
  TAC:
    - "Transaction Authorization Control"
    - "Offline-only, online-only, or combined"

# Key Exchange Methods
key_exchange:
  transport:
    - "via HSM key block (RSA wrapping)"
    - "via EPP (Encrypted PIN Pad)"
    - "via manual entry with ADE (Additional Data Element)"
  verification:
    - "Key Check Value (KCV) verification"
    - "MAC verification on test message"
    - "Echo test: encrypt/decrypt known plaintext"

# Key Ceremony (Manual / Semi-Automated)
key_ceremony:
  setup:
    - "Two-person integrity required for LMK injection"
    - "HSM in FIPS 140-2 Level 3 security module"
    - "Video recording of ceremony (PCI DSS requirement)"
    - "Ceremony log signed by all participants"
  steps:
    - "Generate ZMK on HSM-1"
    - "Export ZMK encrypted under LMK (no cleartext export)"
    - "Transport key block to HSM-2"
    - "Import key block on HSM-2, verify KCV"
    - "Document: key component form numbers, HSM serial numbers, timestamp"

# Key Versioning
key_versioning:
  active_version: 1
  previous_version: 0
  rollover:
    strategy: "Cutover with dual-key period (30 days)"
    reason: "Compromise detection window"
  storage: "Version stored with key in secure key register"

# Audit
audit:
  log_all_key_ops: true
  integrate_with: "SIEM (Splunk/ELK)"