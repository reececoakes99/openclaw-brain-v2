---
# =============================================================================
# Kubernetes Services (ClusterIP + LoadBalancer)
# =============================================================================

# ---------------------------------------------------------------------------
# Neopay Converter Service (ClusterIP)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: neopay-converter
  namespace: neopay
  labels:
    app: neopay-converter
    tier: application
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app: neopay-converter
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: jmx
      port: 7001
      targetPort: 7001
      protocol: TCP
    - name: prometheus
      port: 9090
      targetPort: 9090
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  healthCheck:
    nodePort: 30000
---
# ---------------------------------------------------------------------------
# Neopay Converter Service (LoadBalancer - External)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: neopay-converter-lb
  namespace: neopay
  labels:
    app: neopay-converter
    tier: application
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "${SSL_CERT_ARN}"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/actuator/health"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval-seconds: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout-seconds: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2"
spec:
  type: LoadBalancer
  selector:
    app: neopay-converter
  ports:
    - name: https
      port: 443
      targetPort: 8080
      protocol: TCP
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# ---------------------------------------------------------------------------
# Neopay Switch Service
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: neopay-switch
  namespace: neopay
  labels:
    app: neopay-switch
    tier: application
spec:
  type: ClusterIP
  selector:
    app: neopay-switch
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# ---------------------------------------------------------------------------
# Neopay Auth Host Service
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: neopay-auth-host
  namespace: neopay
  labels:
    app: neopay-auth-host
    tier: application
spec:
  type: ClusterIP
  selector:
    app: neopay-auth-host
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
