# =============================================================================
# Helm Chart for Neopay Protocol Engineering
# =============================================================================

apiVersion: v2
name: neopay
description: A Helm chart for Neopay payment protocol engineering infrastructure
type: application
version: 1.0.0
appVersion: "1.0.0"
kubeVersion: ">=1.26.0-0"
keywords:
  - payment
  - iso8583
  - protocol
  - switch
  - fintech
  - hsm
maintainers:
  - name: Neopay Platform Team
    email: platform@neopay.io
sources:
  - https://github.com/neopay/protocol-engineering
icon: https://neopay.io/assets/images/logo.png
annotations:
  category: Finance
  licenses: Apache-2.0
dependencies:
  - name: postgresql
    version: 12.1.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kafka
    version: 23.x
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled
  - name: prometheus
    version: 25.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 6.x
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
